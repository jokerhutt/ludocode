name: Bug report
description: Report a problem with the application
title: "[Bug]: "
labels: ["bug"]

body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click ...
        3. Error occurs

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / logs
      description: Paste errors or screenshots if helpful.

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        Browser:
        OS:
        Version: