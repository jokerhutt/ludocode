name: Feature request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["feature"]

body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature you'd like.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you considered?

  - type: textarea
    id: context
    attributes:
      label: Additional context
